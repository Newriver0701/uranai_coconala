<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RESEARCH VAULT</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0d0d0f;
  --surface: rgba(255,255,255,0.03);
  --border: rgba(255,255,255,0.08);
  --gold: #c9a84c;
  --gold-dim: rgba(201,168,76,0.15);
  --gold-border: rgba(201,168,76,0.3);
  --text: #e8e4dc;
  --text-dim: rgba(232,228,220,0.45);
  --red: #e74c3c;
  --green: #27ae60;
  --sb: env(safe-area-inset-bottom, 0px);
  --st: env(safe-area-inset-top, 0px);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { background: var(--bg); color: var(--text); font-family: 'Noto Sans JP', sans-serif; min-height: 100vh; overflow-x: hidden; }

body::before {
  content: '';
  position: fixed; inset: 0; pointer-events: none; z-index: 0;
  background:
    radial-gradient(ellipse at 15% 10%, rgba(120,80,200,0.07) 0%, transparent 50%),
    radial-gradient(ellipse at 85% 90%, rgba(200,120,50,0.05) 0%, transparent 50%);
}

/* ── Header ── */
header {
  position: sticky; top: 0; z-index: 100;
  border-bottom: 1px solid var(--border);
  background: rgba(13,13,15,0.92);
  backdrop-filter: blur(14px);
  padding-top: max(12px, var(--st));
}
.header-inner {
  max-width: 900px; margin: 0 auto;
  padding: 14px 20px;
  display: flex; align-items: center; justify-content: space-between;
}
.logo { display: flex; align-items: center; gap: 10px; }
.logo-mark { font-size: 18px; color: var(--gold); }
.logo-text { font-family: 'Cormorant Garamond', serif; font-size: 15px; font-weight: 700; letter-spacing: .22em; }
.header-count { font-size: 11px; color: var(--text-dim); }

/* ── Main scroll ── */
.main { max-width: 900px; margin: 0 auto; padding: 20px 16px 60px; position: relative; z-index: 1; }

/* ── Section ── */
.section { margin-bottom: 28px; }
.section-head {
  font-size: 10px; font-weight: 700; color: var(--gold);
  letter-spacing: .18em; text-transform: uppercase;
  margin-bottom: 14px;
  display: flex; align-items: center; justify-content: space-between;
}
.section-head::before { content: ''; display: inline-block; width: 3px; height: 12px; background: var(--gold); border-radius: 2px; margin-right: 8px; flex-shrink: 0; }

/* ── Upload zone ── */
.upzone {
  border: 2px dashed var(--border); border-radius: 14px;
  padding: 28px 20px; text-align: center; cursor: pointer;
  background: var(--surface); position: relative; overflow: hidden;
  transition: all .2s;
}
.upzone:hover, .upzone.drag { border-color: var(--gold-border); background: var(--gold-dim); }
.upzone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; font-size: 0; }
.up-icon { font-size: 32px; margin-bottom: 8px; }
.up-title { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
.up-sub { font-size: 11px; color: var(--text-dim); }

/* ── Progress ── */
.prog-wrap { display: none; margin-top: 10px; }
.prog-wrap.show { display: block; }
.prog-bar { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; margin-bottom: 6px; }
.prog-fill { height: 100%; background: linear-gradient(90deg, var(--gold), #e8b86d); border-radius: 2px; width: 0%; transition: width .3s; }
.prog-lbl { font-size: 11px; color: var(--text-dim); text-align: center; }

/* ── URL tag ── */
.url-tag {
  display: flex; align-items: center; gap: 8px;
  background: rgba(201,168,76,0.07); border: 1px solid var(--gold-border);
  border-radius: 8px; padding: 8px 12px; margin-top: 8px; cursor: pointer;
}
.url-tag-txt { flex: 1; font-size: 10px; color: var(--gold); word-break: break-all; font-family: monospace; }

/* ── Library ── */
.lib-toolbar {
  display: flex; align-items: center; gap: 8px; margin-bottom: 12px; flex-wrap: wrap;
}
.lib-legend { display: flex; gap: 10px; flex-wrap: wrap; }
.legend-item { display: flex; align-items: center; gap: 4px; font-size: 10px; color: var(--text-dim); }
.legend-dot { width: 10px; height: 10px; border-radius: 2px; }

.lib-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
@media(min-width: 480px) { .lib-grid { grid-template-columns: repeat(4, 1fr); } }
@media(min-width: 700px) { .lib-grid { grid-template-columns: repeat(5, 1fr); } }

.lib-item {
  aspect-ratio: 1; border-radius: 8px; overflow: hidden;
  border: 2px solid var(--border); position: relative; cursor: pointer;
  transition: all .15s; background: rgba(255,255,255,0.03);
}
.lib-item:active { transform: scale(.95); }
.lib-item.sel { border-color: var(--gold); box-shadow: 0 0 0 2px rgba(201,168,76,0.3); }
.lib-item img { width: 100%; height: 100%; object-fit: cover; display: block; }
.lib-item .sel-overlay {
  display: none; position: absolute; inset: 0;
  background: rgba(201,168,76,0.3); align-items: center; justify-content: center;
}
.lib-item.sel .sel-overlay { display: flex; }
.sel-check {
  width: 28px; height: 28px; background: var(--gold);
  border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 14px; color: #0d0d0f; font-weight: 900;
}
.lib-badge {
  position: absolute; top: 4px; left: 4px;
  font-size: 7px; padding: 2px 5px; border-radius: 6px; font-weight: 700;
}
.lib-badge.converted { background: var(--gold); color: #0d0d0f; }
.lib-badge.raw { background: rgba(255,255,255,0.15); color: var(--text-dim); }
.lib-del {
  position: absolute; top: 3px; right: 3px;
  width: 18px; height: 18px; background: rgba(231,76,60,0.85);
  border: none; border-radius: 50%; color: #fff;
  font-size: 9px; cursor: pointer; display: flex; align-items: center; justify-content: center;
  z-index: 3; transition: background .15s;
}
.lib-del:hover { background: var(--red); }
.lib-lbl {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: rgba(0,0,0,.75); font-size: 7px; padding: 3px 4px;
  text-align: center; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.lib-empty { grid-column: 1/-1; text-align: center; padding: 32px; color: var(--text-dim); font-size: 12px; line-height: 2; }

/* ── Sel bar ── */
.sel-bar {
  position: sticky; bottom: calc(var(--sb) + 12px); z-index: 50;
  background: rgba(13,13,15,0.95); border: 1px solid var(--gold-border);
  border-radius: 14px; padding: 14px 16px;
  backdrop-filter: blur(12px);
  display: none;
  box-shadow: 0 8px 32px rgba(0,0,0,.5);
}
.sel-bar.show { display: block; }
.sel-bar-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.sel-bar-count { font-size: 13px; font-weight: 700; color: var(--gold); }

/* ── Confirm card ── */
.confirm-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 14px; padding: 20px; margin-bottom: 28px;
  display: none;
}
.confirm-card.show { display: block; }
.confirm-img-wrap {
  width: 100%; aspect-ratio: 16/9; border-radius: 8px; overflow: hidden;
  border: 1px solid var(--border); margin-bottom: 16px; background: rgba(255,255,255,0.02);
}
.confirm-img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
.analyzing-msg { text-align: center; padding: 32px; color: var(--text-dim); font-size: 13px; }

/* ── Form ── */
.field { margin-bottom: 12px; }
.field-label { font-size: 11px; color: var(--text-dim); margin-bottom: 5px; letter-spacing: .04em; }
input.inp, textarea.inp, select.inp {
  width: 100%; padding: 10px 12px;
  background: rgba(255,255,255,0.04); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); font-size: 13px;
  font-family: 'Noto Sans JP', sans-serif; outline: none; transition: border-color .2s;
  -webkit-appearance: none;
}
input.inp:focus, textarea.inp:focus, select.inp:focus { border-color: var(--gold-border); }
input.inp::placeholder, textarea.inp::placeholder { color: var(--text-dim); }
select.inp option { background: #1a1a1e; }
textarea.inp { resize: vertical; }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

/* ── Buttons ── */
.btn {
  font-family: 'Noto Sans JP', sans-serif; font-size: 13px; font-weight: 700;
  padding: 11px 20px; border: none; cursor: pointer; border-radius: 8px;
  letter-spacing: .04em; transition: all .15s;
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
}
.btn:active { transform: scale(.97); }
.btn-gold { background: linear-gradient(135deg, #c9a84c, #a07830); color: #0d0d0f; }
.btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-dim); }
.btn-red { background: rgba(231,76,60,.12); border: 1px solid rgba(231,76,60,.25); color: var(--red); }
.btn-full { width: 100%; }
.btn-sm { padding: 7px 14px; font-size: 11px; }
.btn:disabled { opacity: .45; cursor: not-allowed; }

/* ── Divider ── */
.divider { border: none; border-top: 1px solid var(--border); margin: 28px 0; }

/* ── Entries ── */
.entry-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 14px; }
.entry-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; overflow: hidden; cursor: pointer; transition: all .2s;
}
.entry-card:hover { border-color: var(--gold-border); transform: translateY(-2px); }
.entry-thumb { width: 100%; aspect-ratio: 16/9; object-fit: cover; display: block; background: rgba(255,255,255,0.02); }
.entry-body { padding: 12px 14px; }
.entry-cat { display: inline-block; padding: 2px 8px; background: var(--gold-dim); border: 1px solid var(--gold-border); border-radius: 10px; font-size: 9px; color: var(--gold); margin-bottom: 6px; }
.entry-title { font-size: 13px; font-weight: 700; margin-bottom: 3px; line-height: 1.4; }
.entry-seller { font-size: 11px; color: var(--text-dim); margin-bottom: 6px; }
.entry-chips { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 5px; }
.chip { padding: 2px 7px; background: rgba(255,255,255,0.05); border-radius: 8px; font-size: 10px; color: var(--text-dim); }
.entry-cap { font-size: 11px; color: var(--text-dim); line-height: 1.5; }

/* ── Search ── */
.search-wrap { position: relative; margin-bottom: 10px; }
.search-inp {
  width: 100%; padding: 11px 12px 11px 36px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); font-size: 13px;
  font-family: 'Noto Sans JP', sans-serif; outline: none; -webkit-appearance: none;
}
.search-inp:focus { border-color: var(--gold-border); }
.search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); font-size: 13px; pointer-events: none; }
.cat-pills { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 14px; scrollbar-width: none; }
.cat-pills::-webkit-scrollbar { display: none; }
.cat-pill {
  flex-shrink: 0; padding: 4px 12px; border-radius: 20px;
  border: 1px solid var(--border); background: transparent;
  color: var(--text-dim); cursor: pointer; font-size: 11px;
  font-family: 'Noto Sans JP', sans-serif; transition: all .15s;
}
.cat-pill.active { background: var(--gold-dim); border-color: var(--gold); color: var(--gold); }

/* ── Detail modal ── */
.detail-overlay {
  display: none; position: fixed; inset: 0; z-index: 200;
  background: rgba(0,0,0,.7); backdrop-filter: blur(4px);
  overflow-y: auto; padding: 20px 16px;
}
.detail-overlay.show { display: block; }
.detail-modal {
  max-width: 700px; margin: 0 auto;
  background: #16161e; border: 1px solid var(--border);
  border-radius: 16px; overflow: hidden;
}
.detail-modal .detail-img-wrap {
  width: 100%; position: relative; cursor: zoom-in;
}
.img-fullscreen {
  display: none; position: fixed; inset: 0; z-index: 300;
  background: rgba(0,0,0,.95); align-items: center; justify-content: center;
  padding: 16px;
}
.img-fullscreen.show { display: flex; }
.img-fullscreen img { max-width: 100%; max-height: 100%; object-fit: contain; border-radius: 4px; }
.img-fullscreen-close {
  position: absolute; top: 16px; right: 16px;
  width: 36px; height: 36px; background: rgba(255,255,255,0.15);
  border: none; border-radius: 50%; color: #fff; font-size: 16px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
}
.detail-img { width: 100%; display: block; }
.detail-body { padding: 20px; }
.detail-sec { margin-bottom: 16px; }
.detail-sec-title { font-size: 9px; letter-spacing: .15em; color: var(--gold); text-transform: uppercase; margin-bottom: 6px; }
.detail-text { font-size: 13px; line-height: 1.8; color: rgba(232,228,220,.8); white-space: pre-wrap; }
.note-text { background: var(--gold-dim); padding: 10px 12px; border-radius: 8px; border-left: 3px solid var(--gold-border); }
.detail-foot { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.detail-date { font-size: 11px; color: var(--text-dim); }

/* ── Toast ── */
#toast {
  position: fixed; top: max(20px, var(--st)); left: 50%; transform: translateX(-50%);
  background: #1e1e2a; border: 1px solid var(--border); border-radius: 10px;
  padding: 10px 20px; font-size: 13px; font-weight: 500;
  opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 9999;
  white-space: nowrap; box-shadow: 0 4px 24px rgba(0,0,0,.5);
}
#toast.show { opacity: 1; }
#toast.ok { border-color: var(--gold); color: var(--gold); }
#toast.err { border-color: var(--red); color: var(--red); }
</style>
</head>
<body>

<div id="toast"></div>

<!-- 画像フルスクリーン -->
<div class="img-fullscreen" id="img-fullscreen" onclick="closeImgFullscreen()">
  <button class="img-fullscreen-close" onclick="closeImgFullscreen()">✕</button>
  <img id="img-fullscreen-img" src="" alt="">
</div>

<!-- Detail overlay -->
<div class="detail-overlay" id="detail-overlay" onclick="closeDetail(event)">
  <div class="detail-modal" id="detail-modal"></div>
</div>

<header>
  <div class="header-inner">
    <div class="logo">
      <span class="logo-mark">◈</span>
      <span class="logo-text">RESEARCH VAULT</span>
    </div>
    <div class="header-count">競合DB · <span id="total-count">0</span>件</div>
  </div>
</header>

<div class="main">

  <!-- ── アップロード ── -->
  <div class="section">
    <div class="section-head"><span>画像をアップロード</span></div>
    <div class="upzone" id="upzone">
      <input type="file" id="fileInput" accept="image/*" onchange="handleUpload(this)">
      <div class="up-icon">📁</div>
      <div class="up-title">タップして画像を選択</div>
      <div class="up-sub">JPG / PNG / WEBP — Driveに保存します</div>
    </div>
    <div class="prog-wrap" id="upProg">
      <div class="prog-bar"><div class="prog-fill" id="upFill"></div></div>
      <div class="prog-lbl" id="upLbl"></div>
    </div>
    <div id="lastUrlTag"></div>
  </div>

  <hr class="divider">

  <!-- ── Driveライブラリ ── -->
  <div class="section">
    <div class="section-head">
      <span>Driveライブラリ</span>
      <div style="display:flex;align-items:center;gap:8px">
        <span id="libCount" style="font-size:10px;color:var(--text-dim);letter-spacing:0"></span>
        <button class="btn btn-outline btn-sm" onclick="loadDriveFiles()" id="reloadBtn">🔄 再読込</button>
      </div>
    </div>
    <div class="prog-wrap" id="driveProg" style="margin-bottom:12px">
      <div class="prog-bar"><div class="prog-fill" id="driveFill"></div></div>
      <div class="prog-lbl" id="driveLbl"></div>
    </div>
    <div class="lib-legend" id="libLegend" style="margin-bottom:12px"></div>
    <div class="lib-grid" id="libGrid">
      <div class="lib-empty">読み込み中...</div>
    </div>
  </div>

  <!-- ── 選択バー ── -->
  <div class="sel-bar" id="selBar">
    <div class="sel-bar-top">
      <div class="sel-bar-count">✅ <span id="selCount">0</span>枚選択中</div>
      <button class="btn btn-outline btn-sm" onclick="clearSelection()">✕ 解除</button>
    </div>
    <button class="btn btn-gold btn-full" style="font-size:15px;padding:14px" onclick="startConvert()">✨ AI読み取り開始</button>
    <div class="prog-wrap" id="convertProg" style="margin-top:8px">
      <div class="prog-bar"><div class="prog-fill" id="convertFill"></div></div>
      <div class="prog-lbl" id="convertLbl"></div>
    </div>
  </div>

  <hr class="divider">

  <!-- ── 確認・登録フォーム ── -->
  <div class="section">
    <div class="section-head"><span>確認・登録</span></div>
    <div class="confirm-card" id="confirmCard">
      <div id="confirm-loading" class="analyzing-msg">⏳ AI解析中...</div>
      <div id="confirm-form" style="display:none">
        <div class="confirm-img-wrap"><img id="confirm-img" src="" alt=""></div>
        <input type="hidden" id="edit-id">
        <input type="hidden" id="f-image-url">
        <div class="field">
          <div class="field-label">サービスタイトル *</div>
          <input class="inp" id="f-service-title" placeholder="例: 恋愛専門タロット占い">
        </div>
        <div class="field">
          <div class="field-label">出品者名</div>
          <input class="inp" id="f-seller-name" placeholder="例: 星詠み師あかり">
        </div>
        <div class="row2 field">
          <div>
            <div class="field-label">価格（円）</div>
            <input class="inp" id="f-price" placeholder="3000">
          </div>
          <div>
            <div class="field-label">評価数</div>
            <input class="inp" id="f-reviews" placeholder="482">
          </div>
        </div>
        <div class="field">
          <div class="field-label">カテゴリ</div>
          <select class="inp" id="f-category">
            <option value="">選択してください</option>
            <option>タロット</option><option>占星術</option><option>数秘術</option>
            <option>手相</option><option>霊視</option><option>その他</option>
          </select>
        </div>
        <div class="field">
          <div class="field-label">プロフィール</div>
          <textarea class="inp" id="f-seller-profile" rows="3"></textarea>
        </div>
        <div class="field">
          <div class="field-label">キャプション</div>
          <textarea class="inp" id="f-caption" rows="5"></textarea>
        </div>
        <div class="field">
          <div class="field-label">メモ・所感</div>
          <textarea class="inp" id="f-notes" rows="3" placeholder="気になった点など"></textarea>
        </div>
        <div style="display:flex;gap:10px;margin-top:4px">
          <button class="btn btn-outline" style="flex:1" onclick="cancelConfirm()">キャンセル</button>
          <button class="btn btn-gold" style="flex:2" id="save-btn" onclick="saveEntry()">✅ 登録する</button>
        </div>
      </div>
    </div>
  </div>

  <hr class="divider">

  <!-- ── 登録済み一覧 ── -->
  <div class="section">
    <div class="section-head"><span>登録済みデータ</span></div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-inp" id="search-input" placeholder="タイトル・出品者・キャプションで検索" oninput="onSearch()">
    </div>
    <div class="cat-pills" id="cat-filters"></div>
    <div id="entries-container"></div>
  </div>

</div><!-- /main -->

<script>
const CATEGORIES = ['すべて','タロット','占星術','数秘術','手相','霊視','その他'];
let currentFilter  = 'すべて';
let searchTimer    = null;
let selectedImages = new Map();
const state        = { images: [] };

// ── Init ──────────────────────────────────────────────────
initCats();
loadEntries();
loadDriveFiles();

// ── Upload ────────────────────────────────────────────────
async function handleUpload(input) {
  const file = input.files[0]; if (!file) return;
  const prog = document.getElementById('upProg');
  const fill = document.getElementById('upFill');
  const lbl  = document.getElementById('upLbl');
  prog.classList.add('show'); fill.style.width = '10%'; lbl.textContent = 'アップロード中...';
  let ticker = setInterval(() => {
    const cur = parseFloat(fill.style.width) || 10;
    fill.style.width = Math.min(cur + Math.random()*18, 85) + '%';
  }, 350);
  try {
    const fd = new FormData();
    fd.append('file', file); fd.append('file_name', file.name);
    const res  = await fetch('/upload', { method:'POST', body: fd });
    if (!res.ok) throw new Error('サーバーエラー: ' + res.status);
    const data = await res.json();
    clearInterval(ticker); fill.style.width = '100%';
    const url = data.drive_url || data.temp_url || '';
    if (!url) throw new Error(data.error || 'URLの取得に失敗');
    lbl.textContent = data.drive_url ? '✓ Driveに保存しました' : '✓ アップロード完了';
    document.getElementById('lastUrlTag').innerHTML =
      '<div class="url-tag" onclick="copyText(\'' + url + '\')"><div class="url-tag-txt">' + url + '</div><span>📋</span></div>';
    toast('✓ ' + (data.drive_url ? 'Driveに保存しました' : 'アップロード完了'), 'ok');
    setTimeout(() => { prog.classList.remove('show'); fill.style.width='0%'; }, 2000);
  } catch(e) {
    clearInterval(ticker); fill.style.width='0%'; prog.classList.remove('show');
    toast('⚠ ' + e.message, 'err');
  }
  input.value = '';
}

// ── Drive一覧 ─────────────────────────────────────────────
async function loadDriveFiles() {
  const btn  = document.getElementById('reloadBtn');
  const prog = document.getElementById('driveProg');
  const fill = document.getElementById('driveFill');
  const lbl  = document.getElementById('driveLbl');
  btn.disabled = true;
  prog.classList.add('show'); fill.style.width = '10%'; lbl.textContent = 'Driveから読み込み中...';
  let ticker = setInterval(() => {
    const cur = parseFloat(fill.style.width) || 10;
    fill.style.width = Math.min(cur + 15, 85) + '%';
  }, 400);
  try {
    const res  = await fetch('/drive/list', { method:'POST', headers:{'Content-Type':'application/json'}, body:'{}' });
    const data = await res.json();
    clearInterval(ticker);
    if (data.error) { toast('⚠ ' + data.error, 'err'); return; }
    if (!Array.isArray(data)) { toast('⚠ データ形式エラー', 'err'); return; }

    state.images = data.map(f => ({
      driveId: f.id,
      name: (f.name || f.title || f.id).replace(/\.[^.]+$/, ''),
      url: 'https://drive.google.com/uc?export=view&id=' + f.id,
      thumb: '/proxy/image?id=' + f.id,
      cloudinaryUrl: '',
    }));

    // 非表示フィルタ
    try {
      const hideRes   = await fetch('/library/hidden/list', { method:'POST', headers:{'Content-Type':'application/json'}, body:'{}' });
      const hiddenIds = await hideRes.json();
      if (Array.isArray(hiddenIds) && hiddenIds.length)
        state.images = state.images.filter(img => !hiddenIds.includes(img.driveId));
    } catch(e) {}

    // Cloudinaryキャッシュ
    const driveIds = state.images.map(i => i.driveId).filter(Boolean);
    if (driveIds.length) {
      try {
        const cacheRes  = await fetch('/library/cloudinary/list', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ file_ids: driveIds }) });
        const cacheData = await cacheRes.json();
        state.images.forEach(img => { if (cacheData[img.driveId]) img.cloudinaryUrl = cacheData[img.driveId]; });
      } catch(e) {}
    }

    fill.style.width = '100%'; lbl.textContent = '✓ ' + state.images.length + '枚読み込みました';
    renderLibrary();
    toast('✓ ' + state.images.length + '枚読み込みました', 'ok');
  } catch(e) {
    clearInterval(ticker); toast('⚠ ' + e.message, 'err');
  } finally {
    btn.disabled = false;
    setTimeout(() => { prog.classList.remove('show'); fill.style.width='0%'; }, 1500);
  }
}

function renderLibrary() {
  const grid   = document.getElementById('libGrid');
  const legend = document.getElementById('libLegend');
  document.getElementById('libCount').textContent = state.images.length + '枚';
  if (!state.images.length) { grid.innerHTML = '<div class="lib-empty">ファイルが見つかりませんでした</div>'; return; }

  const converted = state.images.filter(i => i.cloudinaryUrl).length;
  legend.innerHTML =
    '<div class="legend-item"><div class="legend-dot" style="border:2px solid #444"></div>未変換 ' + (state.images.length - converted) + '枚</div>' +
    '<div class="legend-item"><div class="legend-dot" style="background:rgba(201,168,76,.2);border:2px solid var(--gold)"></div>変換済 ' + converted + '枚</div>';

  grid.innerHTML = '';
  state.images.forEach(img => {
    const hasCloud = !!img.cloudinaryUrl;
    const sel      = selectedImages.has(img.driveId);
    const div      = document.createElement('div');
    div.className  = 'lib-item' + (sel ? ' sel' : '');
    div.id         = 'li-' + img.driveId;
    if (hasCloud) { div.style.borderColor = 'var(--gold)'; div.style.background = 'rgba(201,168,76,0.05)'; }

    const badge = hasCloud
      ? '<div class="lib-badge converted">☁ 変換済</div>'
      : '<div class="lib-badge raw">未変換</div>';

    const urlRow = hasCloud
      ? '<div style="padding:2px 5px 4px;display:flex;align-items:center;gap:3px">' +
        '<div style="font-size:7px;color:var(--gold);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + img.cloudinaryUrl + '</div>' +
        '<button onclick="event.stopPropagation();copyText(\'' + img.cloudinaryUrl.replace(/'/g,"\\'") + '\')" style="background:var(--gold-dim);border:none;color:var(--gold);font-size:8px;padding:1px 4px;border-radius:3px;cursor:pointer;flex-shrink:0">📋</button>' +
        '</div>' : '';

    div.innerHTML =
      '<div style="position:relative">' +
      '<img src="' + img.thumb + '" onerror="this.src=\'' + img.url + '\';this.onerror=null" loading="lazy">' +
      badge +
      '<button class="lib-del" onclick="event.stopPropagation();hideFile(\'' + img.driveId + '\')">✕</button>' +
      '<div class="sel-overlay"><div class="sel-check">✓</div></div>' +
      '</div>' +
      '<div class="lib-lbl">' + img.name + '</div>' +
      urlRow;

    div.onclick = () => toggleSel(img.driveId);
    grid.appendChild(div);
  });
}

function toggleSel(id) {
  const img = state.images.find(i => i.driveId === id); if (!img) return;
  const el  = document.getElementById('li-' + id);
  if (selectedImages.has(id)) { selectedImages.delete(id); el.classList.remove('sel'); }
  else { selectedImages.set(id, img); el.classList.add('sel'); }
  updateSelBar();
}

function clearSelection() {
  selectedImages.forEach((v, id) => { const el = document.getElementById('li-'+id); if(el) el.classList.remove('sel'); });
  selectedImages.clear(); updateSelBar();
}

function updateSelBar() {
  const bar = document.getElementById('selBar');
  const cnt = selectedImages.size;
  bar.classList.toggle('show', cnt > 0);
  document.getElementById('selCount').textContent = cnt;
}

async function hideFile(driveId) {
  if (!confirm('このファイルをライブラリから非表示にしますか？')) return;
  try {
    await fetch('/library/hide', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ drive_file_id: driveId }) });
    state.images = state.images.filter(i => i.driveId !== driveId);
    selectedImages.delete(driveId);
    updateSelBar(); renderLibrary();
    toast('非表示にしました', 'ok');
  } catch(e) { toast('⚠ ' + e.message, 'err'); }
}

// ── Cloudinary → Vision AI ────────────────────────────────
async function startConvert() {
  if (!selectedImages.size) return;
  const f        = [...selectedImages.values()][0];
  const driveUrl = f.url;
  const card     = document.getElementById('confirmCard');
  card.classList.add('show');
  document.getElementById('confirm-loading').style.display = 'block';
  document.getElementById('confirm-loading').textContent   = '☁️ Cloudinaryに変換中...';
  document.getElementById('confirm-form').style.display    = 'none';
  card.scrollIntoView({ behavior: 'smooth', block: 'start' });

  let cloudinaryUrl = '';
  try {
    const res  = await fetch('/cloudinary/upload', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ drive_url: driveUrl, public_id: '' }) });
    const data = await res.json();
    if (!data.url) { document.getElementById('confirm-loading').textContent = '⚠ Cloudinary変換失敗: ' + (data.error||''); return; }
    cloudinaryUrl = data.url;
    fetch('/library/cloudinary/save', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ drive_file_id: f.driveId, cloudinary_url: cloudinaryUrl }) }).catch(()=>{});
    const stateImg = state.images.find(i => i.driveId === f.driveId);
    if (stateImg) { stateImg.cloudinaryUrl = cloudinaryUrl; renderLibrary(); }
  } catch(e) { document.getElementById('confirm-loading').textContent = '⚠ エラー: ' + e.message; return; }

  document.getElementById('confirm-loading').textContent = '🔍 AI読み取りリクエスト中...';
  let responseId = '';
  try {
    const res  = await fetch('/analyze', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ image_url: cloudinaryUrl }) });
    const data = await res.json();
    if (!data.response_id) { document.getElementById('confirm-loading').textContent = '⚠ AI読み取り失敗: ' + (data.error||''); return; }
    responseId = data.response_id;
  } catch(e) { document.getElementById('confirm-loading').textContent = '⚠ エラー: ' + e.message; return; }

  pollResult(responseId, cloudinaryUrl, 0);
}

function pollResult(responseId, cloudinaryUrl, attempt) {
  if (attempt > 20) { document.getElementById('confirm-loading').textContent = '⚠ タイムアウト'; return; }
  document.getElementById('confirm-loading').textContent = '⏳ AI解析中... (' + (attempt+1) + ')';
  setTimeout(async () => {
    try {
      const res  = await fetch('/analyze/result', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ response_id: responseId }) });
      const data = await res.json();
      if (data.status === 'processing') { pollResult(responseId, cloudinaryUrl, attempt+1); return; }
      if (data.status === 'done' && data.data) { fillConfirmForm(data.data, cloudinaryUrl); return; }
      if (data.status === 'error') { document.getElementById('confirm-loading').textContent = '⚠ ' + (data.error||'エラー'); return; }
      pollResult(responseId, cloudinaryUrl, attempt+1);
    } catch(e) { document.getElementById('confirm-loading').textContent = '⚠ エラー: ' + e.message; }
  }, 2000);
}

function fillConfirmForm(d, imageUrl) {
  document.getElementById('confirm-loading').style.display = 'none';
  document.getElementById('confirm-form').style.display    = 'block';
  document.getElementById('f-service-title').value  = d.service_title  || '';
  document.getElementById('f-seller-name').value    = d.seller_name    || '';
  document.getElementById('f-seller-profile').value = d.seller_profile || '';
  document.getElementById('f-caption').value        = d.caption        || '';
  document.getElementById('f-price').value          = d.price          || '';
  document.getElementById('f-reviews').value        = d.reviews        || '';
  document.getElementById('f-category').value       = d.category       || '';
  document.getElementById('f-notes').value          = '';
  document.getElementById('f-image-url').value      = imageUrl;
  document.getElementById('edit-id').value          = '';
  document.getElementById('confirm-img').src        = imageUrl;
  document.getElementById('save-btn').textContent   = '✅ 登録する';
}

function cancelConfirm() {
  document.getElementById('confirmCard').classList.remove('show');
  document.getElementById('confirm-form').style.display = 'none';
  document.getElementById('confirm-loading').style.display = 'block';
}

// ── 保存 ──────────────────────────────────────────────────
async function saveEntry() {
  const title = document.getElementById('f-service-title').value.trim();
  if (!title) { toast('サービスタイトルは必須です', 'err'); return; }
  const btn = document.getElementById('save-btn');
  btn.disabled = true; btn.textContent = '保存中...';
  const editId = document.getElementById('edit-id').value;
  const body = {
    service_title:  title,
    seller_name:    document.getElementById('f-seller-name').value,
    seller_profile: document.getElementById('f-seller-profile').value,
    caption:        document.getElementById('f-caption').value,
    price:          document.getElementById('f-price').value,
    reviews:        document.getElementById('f-reviews').value,
    category:       document.getElementById('f-category').value,
    image_url:      document.getElementById('f-image-url').value,
    notes:          document.getElementById('f-notes').value,
  };
  const url = editId ? '/research/entries/' + editId : '/research/entries';
  const res = await fetch(url, { method: editId?'PUT':'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
  btn.disabled = false;
  if (res.ok) {
    toast('✓ ' + (editId?'更新しました':'登録しました！'), 'ok');
    cancelConfirm(); clearSelection(); loadEntries();
  } else {
    const d = await res.json();
    btn.textContent = editId?'更新する':'✅ 登録する';
    toast('⚠ ' + (d.error||'エラー'), 'err');
  }
}

// ── 一覧 ──────────────────────────────────────────────────
function initCats() {
  document.getElementById('cat-filters').innerHTML = CATEGORIES.map(c =>
    '<button class="cat-pill' + (c===currentFilter?' active':'') + '" onclick="setCategory(\'' + c + '\')">' + c + '</button>'
  ).join('');
}
function setCategory(cat) { currentFilter = cat; initCats(); loadEntries(); }
function onSearch() { clearTimeout(searchTimer); searchTimer = setTimeout(loadEntries, 300); }

async function loadEntries() {
  const search = document.getElementById('search-input').value;
  const params = new URLSearchParams({ search, category: currentFilter });
  const res    = await fetch('/research/entries?' + params);
  const entries = await res.json();
  document.getElementById('total-count').textContent = entries.length;
  renderEntries(entries);
}

function renderEntries(entries) {
  const el = document.getElementById('entries-container');
  if (!entries.length) {
    el.innerHTML = '<div style="text-align:center;padding:40px;color:var(--text-dim);font-size:13px">データがありません<br><br>ライブラリから画像を選択してAI読み取りしましょう</div>';
    return;
  }
  el.innerHTML = '<div class="entry-grid">' + entries.map(e => {
    const img   = e.image_url ? '<img class="entry-thumb" src="' + e.image_url + '" alt="" loading="lazy">' : '';
    const badge = e.category  ? '<span class="entry-cat">' + e.category + '</span>' : '';
    const chips = [e.price?'<span class="chip">¥'+e.price+'</span>':'', e.reviews?'<span class="chip">★ '+e.reviews+'件</span>':''].filter(Boolean).join('');
    const cap   = e.caption ? '<div class="entry-cap">' + e.caption.slice(0,60) + '…</div>' : '';
    return '<div class="entry-card" onclick="openDetail(' + e.id + ')">' + img +
      '<div class="entry-body">' + badge +
      '<div class="entry-title">' + e.service_title + '</div>' +
      (e.seller_name ? '<div class="entry-seller">@' + e.seller_name + '</div>' : '') +
      '<div class="entry-chips">' + chips + '</div>' + cap +
      '</div></div>';
  }).join('') + '</div>';
}

// ── Detail ────────────────────────────────────────────────
async function openDetail(id) {
  const res = await fetch('/research/entries/' + id);
  const e   = await res.json();

  const badge = e.category  ? '<span class="entry-cat" style="margin-bottom:8px;display:inline-block">' + e.category + '</span>' : '';
  const chips = [e.price?'<span class="chip">¥'+e.price+'</span>':'',e.reviews?'<span class="chip">★ 評価 '+e.reviews+'件</span>':''].filter(Boolean).join('');
  const prof  = e.seller_profile ? '<div class="detail-sec"><div class="detail-sec-title">プロフィール</div><div class="detail-text">' + e.seller_profile + '</div></div>' : '';
  const cap   = e.caption ? '<div class="detail-sec"><div class="detail-sec-title">キャプション</div><div class="detail-text">' + e.caption + '</div></div>' : '';
  const notes = e.notes   ? '<div class="detail-sec"><div class="detail-sec-title">メモ・所感</div><div class="detail-text note-text">' + e.notes + '</div></div>' : '';
  document.getElementById('detail-modal').innerHTML = img +
    '<div class="detail-body">' + badge +
    '<div style="font-size:17px;font-weight:700;margin-bottom:4px;line-height:1.4;font-family:\'Cormorant Garamond\',serif">' + e.service_title + '</div>' +
    (e.seller_name ? '<div style="font-size:12px;color:var(--text-dim);margin-bottom:8px">出品者: ' + e.seller_name + '</div>' : '') +
    '<div class="entry-chips" style="margin-bottom:14px">' + chips + '</div>' +
    prof + cap + notes + '</div>' +
    '<div class="detail-foot">' +
    '<div class="detail-date">登録: ' + e.created_at + '</div>' +
    '<div style="display:flex;gap:8px">' +
    '<button class="btn btn-outline btn-sm" onclick="startEdit(' + e.id + ')">✏️ 編集</button>' +
    '<button class="btn btn-red btn-sm" onclick="if(confirm(\'削除しますか？\'))deleteEntry(' + e.id + ')">🗑</button>' +
    '</div></div>';
  document.getElementById('detail-overlay').classList.add('show');
}

function closeDetail(e) {
  if (e.target === document.getElementById('detail-overlay'))
    document.getElementById('detail-overlay').classList.remove('show');
}

async function startEdit(id) {
  const res = await fetch('/research/entries/' + id);
  const e   = await res.json();
  document.getElementById('edit-id').value          = e.id;
  document.getElementById('f-service-title').value  = e.service_title;
  document.getElementById('f-seller-name').value    = e.seller_name;
  document.getElementById('f-seller-profile').value = e.seller_profile;
  document.getElementById('f-caption').value        = e.caption;
  document.getElementById('f-price').value          = e.price;
  document.getElementById('f-reviews').value        = e.reviews;
  document.getElementById('f-category').value       = e.category;
  document.getElementById('f-notes').value          = e.notes;
  document.getElementById('f-image-url').value      = e.image_url;
  document.getElementById('confirm-img').src        = e.image_url;
  document.getElementById('confirm-loading').style.display = 'none';
  document.getElementById('confirm-form').style.display    = 'block';
  document.getElementById('save-btn').textContent   = '更新する';
  document.getElementById('confirmCard').classList.add('show');
  document.getElementById('detail-overlay').classList.remove('show');
  document.getElementById('confirmCard').scrollIntoView({ behavior:'smooth' });
}

async function deleteEntry(id) {
  await fetch('/research/entries/' + id, { method:'DELETE' });
  document.getElementById('detail-overlay').classList.remove('show');
  toast('削除しました', 'ok'); loadEntries();
}

// ── Helpers ───────────────────────────────────────────────
function openImgFullscreen(url) {
  document.getElementById('img-fullscreen-img').src = url;
  document.getElementById('img-fullscreen').classList.add('show');
}
function closeImgFullscreen() {
  document.getElementById('img-fullscreen').classList.remove('show');
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(() => toast('📋 コピーしました', 'ok')).catch(() => {
    const el = document.createElement('textarea'); el.value = text;
    document.body.appendChild(el); el.select(); document.execCommand('copy');
    document.body.removeChild(el); toast('📋 コピーしました', 'ok');
  });
}

function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'show' + (type?' '+type:'');
  clearTimeout(el._t); el._t = setTimeout(() => el.className = '', 2800);
}
</script>
