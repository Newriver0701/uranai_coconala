<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>RESEARCH VAULT</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0c0c14; --bg2:#11111c; --panel:#161625; --panel2:#1c1c2e;
  --border:#252538; --accent:#7c3aed; --accent2:#a78bfa;
  --green:#10b981; --green2:#34d399; --yellow:#f59e0b;
  --red:#ef4444; --text:#e2e8f0; --muted:#64748b; --muted2:#3f3f5a;
  --sb:env(safe-area-inset-bottom,0px); --st:env(safe-area-inset-top,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;overflow:hidden}
.app{display:flex;flex-direction:column;height:100%;height:100dvh}

/* Header */
.hdr{background:var(--bg2);border-bottom:1px solid var(--border);
  padding:12px 16px;padding-top:max(12px,var(--st));
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.hdr-title{font-size:15px;font-weight:700;color:var(--accent2);letter-spacing:.05em}
.hdr-count{font-size:11px;color:var(--muted)}

/* Scroll */
.main{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch}
.page{display:none;padding:16px;padding-bottom:28px}
.page.active{display:block}

/* Tabbar */
.tabbar{background:var(--bg2);border-top:1px solid var(--border);
  display:flex;flex-shrink:0;padding-bottom:var(--sb);
  overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;position:relative;z-index:100}
.tabbar::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;min-width:60px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:10px 6px;cursor:pointer;gap:3px;border:none;background:none;
  color:var(--muted);transition:color .15s;touch-action:manipulation}
.tab.active{color:var(--accent2)}
.tab-icon{font-size:20px;line-height:1}
.tab-lbl{font-size:9px;font-weight:700;letter-spacing:.04em}

/* Cards */
.card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px}

/* Section head */
.sh{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.15em;
  text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.sh::before{content:'';width:3px;height:11px;background:var(--accent);border-radius:2px;flex-shrink:0}

/* Buttons */
.btn{font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:700;
  padding:12px 16px;border:none;cursor:pointer;border-radius:8px;
  letter-spacing:.04em;transition:all .15s;
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  -webkit-appearance:none;touch-action:manipulation}
.btn:active{transform:scale(.97);opacity:.9}
.btn-primary{background:var(--accent);color:white}
.btn-outline{background:var(--panel2);color:var(--accent2);border:1px solid var(--border)}
.btn-full{width:100%}
.btn-sm{padding:8px 12px;font-size:11px}

/* Upload zone */
.upzone{border:2px dashed var(--border);border-radius:12px;padding:28px 20px;
  text-align:center;cursor:pointer;background:var(--bg2);position:relative;overflow:hidden;transition:all .2s}
.upzone.drag{border-color:var(--accent);background:rgba(124,58,237,.08)}
.upzone input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;font-size:0}
.up-icon{font-size:36px;margin-bottom:8px}
.up-title{font-size:14px;font-weight:700;margin-bottom:4px}
.up-sub{font-size:11px;color:var(--muted)}

/* Progress */
.prog-wrap{display:none;margin-top:10px}
.prog-wrap.show{display:block}
.prog-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden;margin-bottom:6px}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--green));border-radius:2px;width:0%;transition:width .3s}
.prog-lbl{font-size:11px;color:var(--muted);text-align:center}

/* Library grid */
.lib-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
.lib-item{aspect-ratio:1;border-radius:8px;overflow:hidden;
  border:2px solid var(--border);position:relative;cursor:pointer;
  transition:border-color .15s;background:var(--bg2)}
.lib-item:active{transform:scale(.96)}
.lib-item.sel{border-color:var(--accent)}
.lib-item img{width:100%;height:100%;object-fit:cover;display:block}
.lib-lbl{position:absolute;bottom:0;left:0;right:0;
  background:rgba(0,0,0,.75);font-size:8px;padding:3px 5px;
  text-align:center;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lib-badge{position:absolute;top:4px;left:4px;font-size:8px;padding:2px 6px;border-radius:8px;font-weight:bold}
.lib-badge.converted{background:#7c3aed;color:#fff}
.lib-badge.raw{background:#555;color:#ccc}
.lib-empty{grid-column:1/-1;text-align:center;padding:24px;color:var(--muted2);font-size:12px;line-height:2}

/* URL tag */
.url-tag{display:flex;align-items:center;gap:8px;
  background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.2);
  border-radius:8px;padding:8px 12px;margin-top:8px;cursor:pointer}
.url-tag-txt{flex:1;font-size:10px;color:var(--green2);word-break:break-all;line-height:1.5;font-family:monospace}

/* Inputs */
.inp{width:100%;background:var(--bg2);border:1px solid var(--border);
  color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:14px;
  padding:11px 12px;outline:none;border-radius:8px;transition:border-color .2s;-webkit-appearance:none}
.inp:focus{border-color:var(--accent)}
.inp::placeholder{color:var(--muted2)}
textarea.inp{resize:none;line-height:1.6}
select.inp option{background:var(--bg2)}
.il{font-size:11px;color:var(--muted);margin-bottom:5px}
.ir{margin-bottom:10px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:8px}

/* Confirm */
.confirm-img-wrap{width:100%;aspect-ratio:16/9;border-radius:8px;overflow:hidden;
  border:1px solid var(--border);margin-bottom:12px;background:var(--bg2)}
.confirm-img-wrap img{width:100%;height:100%;object-fit:cover;display:block}

/* Toast */
#toast{position:fixed;top:max(16px,var(--st));left:50%;transform:translateX(-50%);
  background:var(--panel2);border:1px solid var(--border);border-radius:10px;
  padding:10px 18px;font-size:13px;font-weight:500;
  opacity:0;transition:opacity .3s;pointer-events:none;z-index:9999;
  white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.4)}
#toast.show{opacity:1}
#toast.ok{border-color:var(--green);color:var(--green2)}
#toast.err{border-color:var(--red);color:var(--red)}

/* List / Detail */
.entry-card{background:var(--panel);border:1px solid var(--border);border-radius:10px;
  overflow:hidden;margin-bottom:10px;cursor:pointer;transition:border-color .15s}
.entry-card:active{border-color:var(--accent)}
.entry-thumb{width:100%;aspect-ratio:16/9;object-fit:cover;display:block;background:var(--bg2)}
.entry-body{padding:10px 12px}
.entry-title{font-size:13px;font-weight:700;margin-bottom:3px;line-height:1.4}
.entry-seller{font-size:11px;color:var(--muted);margin-bottom:6px}
.entry-chips{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:5px}
.chip{padding:2px 8px;background:rgba(124,58,237,.15);border:1px solid rgba(124,58,237,.25);
  border-radius:10px;font-size:10px;color:var(--accent2)}
.entry-cap{font-size:11px;color:var(--muted);line-height:1.5}
.cat-badge{display:inline-block;padding:2px 8px;background:rgba(124,58,237,.2);
  border:1px solid rgba(124,58,237,.3);border-radius:10px;font-size:10px;
  color:var(--accent2);margin-bottom:6px}

/* Search */
.search-wrap{position:relative;margin-bottom:10px}
.search-inp{width:100%;background:var(--panel);border:1px solid var(--border);
  color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:14px;
  padding:11px 12px 11px 36px;outline:none;border-radius:8px;-webkit-appearance:none}
.search-inp:focus{border-color:var(--accent)}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none}
.cat-scroll{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;scrollbar-width:none}
.cat-scroll::-webkit-scrollbar{display:none}
.cat-pill{flex-shrink:0;padding:5px 12px;border-radius:20px;border:1px solid var(--border);
  background:transparent;color:var(--muted);cursor:pointer;font-size:11px;
  font-family:'Noto Sans JP',sans-serif;white-space:nowrap;transition:all .15s}
.cat-pill.active{background:rgba(124,58,237,.2);border-color:var(--accent);color:var(--accent2)}

/* Detail */
.detail-sec{margin-bottom:14px}
.detail-sec-title{font-size:9px;letter-spacing:.15em;color:var(--accent2);
  text-transform:uppercase;margin-bottom:6px;font-weight:700}
.detail-text{font-size:13px;line-height:1.8;color:var(--text);white-space:pre-wrap}
.note-text{background:rgba(124,58,237,.06);padding:10px 12px;
  border-radius:8px;border-left:3px solid rgba(124,58,237,.4)}
</style>
</head>
<body>
<div class="app">

<div id="toast"></div>

<header class="hdr">
  <div class="hdr-title">◈ RESEARCH VAULT</div>
  <div class="hdr-count">競合DB · <span id="total-count">0</span>件</div>
</header>

<div class="main" id="mainScroll">

  <!-- ── ライブラリ ── -->
  <div class="page active" id="page-library">

    <!-- アップロード -->
    <div class="card">
      <div class="sh">画像をアップロード</div>
      <div class="upzone" id="upzone">
        <input type="file" id="fileInput" accept="image/*" onchange="handleUpload(this)">
        <div class="up-icon">📁</div>
        <div class="up-title">タップして画像を選択</div>
        <div class="up-sub">JPG / PNG / WEBP</div>
      </div>
      <div class="prog-wrap" id="upProg">
        <div class="prog-bar"><div class="prog-fill" id="upFill"></div></div>
        <div class="prog-lbl" id="upLbl">アップロード中...</div>
      </div>
      <div id="lastUrlTag"></div>
    </div>

    <!-- Drive ライブラリ -->
    <div class="card">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div class="sh" style="margin-bottom:0">Driveライブラリ</div>
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-size:10px;color:var(--muted)" id="libCount">0枚</span>
          <button class="btn btn-outline btn-sm" onclick="loadDriveFiles()" id="reloadBtn">🔄</button>
        </div>
      </div>
      <div id="driveLoading" style="display:none;margin-bottom:8px">
        <div class="prog-bar"><div class="prog-fill" id="driveFill"></div></div>
        <div style="font-size:11px;color:var(--muted);text-align:center;margin-top:5px" id="driveLbl">読み込み中...</div>
      </div>
      <div id="libLegend" style="display:flex;gap:10px;margin-bottom:8px;flex-wrap:wrap"></div>
      <div class="lib-grid" id="libGrid">
        <div class="lib-empty">🔄 読み込むボタンを押してDriveから取得</div>
      </div>
    </div>

    <!-- 選択パネル -->
    <div class="card" id="selPanel" style="display:none">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div class="sh" style="margin-bottom:0">選択中 <span id="selCount" style="color:var(--accent2)">0</span>枚</div>
        <button class="btn btn-outline btn-sm" onclick="clearSelection()">✕ 解除</button>
      </div>
      <button class="btn btn-primary btn-full" onclick="startConvert()">✨ AI読み取り開始</button>
      <div class="prog-wrap" id="convertProg" style="margin-top:8px">
        <div class="prog-bar"><div class="prog-fill" id="convertFill"></div></div>
        <div class="prog-lbl" id="convertLbl"></div>
      </div>
    </div>

  </div>

  <!-- ── 確認・登録 ── -->
  <div class="page" id="page-confirm">
    <div class="card">
      <div class="sh">AI読み取り結果を確認</div>
      <div id="confirm-loading" style="text-align:center;padding:24px;color:var(--muted);font-size:13px">⏳ AI解析中...</div>
      <div id="confirm-form" style="display:none">
        <div class="confirm-img-wrap"><img id="confirm-img" src="" alt=""></div>
        <input type="hidden" id="edit-id">
        <input type="hidden" id="f-image-url">
        <div class="ir">
          <div class="il">サービスタイトル *</div>
          <input class="inp" id="f-service-title" placeholder="例: 恋愛専門タロット占い">
        </div>
        <div class="ir">
          <div class="il">出品者名</div>
          <input class="inp" id="f-seller-name" placeholder="例: 星詠み師あかり">
        </div>
        <div class="row2 ir">
          <div>
            <div class="il">価格（円）</div>
            <input class="inp" id="f-price" placeholder="3000">
          </div>
          <div>
            <div class="il">評価数</div>
            <input class="inp" id="f-reviews" placeholder="482">
          </div>
        </div>
        <div class="ir">
          <div class="il">カテゴリ</div>
          <select class="inp" id="f-category">
            <option value="">選択してください</option>
            <option>タロット</option><option>占星術</option><option>数秘術</option>
            <option>手相</option><option>霊視</option><option>その他</option>
          </select>
        </div>
        <div class="ir">
          <div class="il">プロフィール</div>
          <textarea class="inp" id="f-seller-profile" rows="3"></textarea>
        </div>
        <div class="ir">
          <div class="il">キャプション</div>
          <textarea class="inp" id="f-caption" rows="5"></textarea>
        </div>
        <div class="ir">
          <div class="il">メモ・所感</div>
          <textarea class="inp" id="f-notes" rows="3"></textarea>
        </div>
        <div style="display:flex;gap:8px;margin-top:4px">
          <button class="btn btn-outline" style="flex:1" onclick="switchTab('library')">← 戻る</button>
          <button class="btn btn-primary" style="flex:2" id="save-btn" onclick="saveEntry()">✅ 登録する</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ── 一覧 ── -->
  <div class="page" id="page-list">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-inp" id="search-input" placeholder="タイトル・出品者・キャプションで検索" oninput="onSearch()">
    </div>
    <div class="cat-scroll" id="cat-filters"></div>
    <div id="entries-container"></div>
  </div>

  <!-- ── 詳細 ── -->
  <div class="page" id="page-detail">
    <div class="card">
      <button style="background:none;border:none;color:var(--muted);font-size:13px;cursor:pointer;margin-bottom:12px;padding:0;font-family:'Noto Sans JP',sans-serif" onclick="switchTab('list')">← 一覧に戻る</button>
      <div id="detail-content"></div>
    </div>
  </div>

</div><!-- /main -->

<nav class="tabbar">
  <button class="tab active" id="tab-library" onclick="switchTab('library')">
    <span class="tab-icon">📁</span><span class="tab-lbl">ライブラリ</span>
  </button>
  <button class="tab" id="tab-confirm" onclick="switchTab('confirm')">
    <span class="tab-icon">✨</span><span class="tab-lbl">確認・登録</span>
  </button>
  <button class="tab" id="tab-list" onclick="switchTab('list')">
    <span class="tab-icon">📋</span><span class="tab-lbl">一覧</span>
  </button>
</nav>

</div><!-- /app -->

<script>
const CATEGORIES = ['すべて','タロット','占星術','数秘術','手相','霊視','その他'];
let currentFilter = 'すべて';
let searchTimer   = null;
let selectedImages = new Map(); // id -> file obj
let driveFiles     = [];

// ── タブ切替 ───────────────────────────────────────────────
function switchTab(name) {
  ['library','confirm','list','detail'].forEach(n => {
    document.getElementById('page-' + n).classList.toggle('active', n === name);
  });
  ['library','confirm','list'].forEach(n => {
    const t = document.getElementById('tab-' + n);
    if (t) t.classList.toggle('active', n === name);
  });
  if (name === 'list') loadEntries();
}

// ── アップロード ──────────────────────────────────────────
async function handleUpload(input) {
  const file = input.files[0];
  if (!file) return;
  const prog = document.getElementById('upProg');
  const fill = document.getElementById('upFill');
  const lbl  = document.getElementById('upLbl');
  prog.classList.add('show');
  fill.style.width = '10%';
  lbl.textContent  = 'アップロード中...';

  let ticker = setInterval(() => {
    const cur = parseFloat(fill.style.width) || 10;
    fill.style.width = Math.min(cur + Math.random() * 18, 85) + '%';
  }, 350);

  try {
    const fd = new FormData();
    fd.append('file', file);
    fd.append('file_name', file.name);
    const res  = await fetch('/upload', { method:'POST', body: fd });
    if (!res.ok) throw new Error('サーバーエラー: ' + res.status);
    const data = await res.json();
    clearInterval(ticker);
    fill.style.width = '100%';
    const url = data.drive_url || data.temp_url || '';
    if (!url) throw new Error(data.error || 'URLの取得に失敗しました');
    lbl.textContent = data.drive_url ? '✓ Driveに保存しました！' : '✓ 一時URLを取得しました';
    document.getElementById('lastUrlTag').innerHTML =
      '<div class="url-tag"><div class="url-tag-txt">' + url + '</div><div>📋</div></div>';
    toast('✓ ' + (data.drive_url ? 'Driveに保存しました' : 'アップロード完了'), 'ok');
    setTimeout(() => { prog.classList.remove('show'); fill.style.width='0%'; }, 2000);
  } catch(e) {
    clearInterval(ticker);
    fill.style.width = '0%';
    prog.classList.remove('show');
    toast('⚠ ' + e.message, 'err');
  }
  input.value = '';
}

// ── Drive一覧 ─────────────────────────────────────────────
async function loadDriveFiles() {
  const btn  = document.getElementById('reloadBtn');
  const load = document.getElementById('driveLoading');
  const fill = document.getElementById('driveFill');
  const lbl  = document.getElementById('driveLbl');
  btn.disabled = true;
  load.style.display = 'block';
  fill.style.width = '10%';

  let ticker = setInterval(() => {
    const cur = parseFloat(fill.style.width) || 10;
    fill.style.width = Math.min(cur + 15, 85) + '%';
  }, 400);

  try {
    const res  = await fetch('/drive/list', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({})
    });
    const data = await res.json();
    clearInterval(ticker);
    fill.style.width = '100%';
    if (data.error) { toast('⚠ ' + data.error, 'err'); return; }
    if (!Array.isArray(data)) { toast('⚠ データ形式エラー', 'err'); return; }
    driveFiles = data;
    renderLibrary();
    toast('✓ ' + data.length + '枚読み込みました', 'ok');
  } catch(e) {
    clearInterval(ticker);
    toast('⚠ ' + e.message, 'err');
  } finally {
    btn.disabled = false;
    setTimeout(() => { load.style.display='none'; fill.style.width='0%'; }, 1000);
  }
}

function renderLibrary() {
  const grid   = document.getElementById('libGrid');
  const legend = document.getElementById('libLegend');
  document.getElementById('libCount').textContent = driveFiles.length + '枚';

  if (!driveFiles.length) {
    grid.innerHTML = '<div class="lib-empty">ファイルが見つかりませんでした</div>';
    return;
  }

  grid.innerHTML = driveFiles.map(f => {
    const sel   = selectedImages.has(f.id);
    const thumb = '/proxy/image?id=' + f.id;
    const name  = (f.name || f.title || f.id).replace(/\.[^.]+$/, '');
    return '<div class="lib-item' + (sel?' sel':'') + '" id="li-' + f.id + '" onclick="toggleSel(\'' + f.id + '\')">' +
      '<img src="' + thumb + '" alt="" loading="lazy" onerror="this.parentNode.style.background=\'#1c1c2e\'">' +
      '<div class="lib-badge raw" id="lb-' + f.id + '">未変換</div>' +
      '<div class="lib-lbl">' + name + '</div>' +
      '</div>';
  }).join('');
}

function toggleSel(id) {
  const f = driveFiles.find(f => f.id === id);
  if (!f) return;
  const el = document.getElementById('li-' + id);
  if (selectedImages.has(id)) {
    selectedImages.delete(id);
    el.classList.remove('sel');
  } else {
    selectedImages.set(id, f);
    el.classList.add('sel');
  }
  updateSelPanel();
}

function clearSelection() {
  selectedImages.forEach((v, id) => {
    const el = document.getElementById('li-' + id);
    if (el) el.classList.remove('sel');
  });
  selectedImages.clear();
  updateSelPanel();
}

function updateSelPanel() {
  const panel = document.getElementById('selPanel');
  const cnt   = selectedImages.size;
  panel.style.display = cnt > 0 ? 'block' : 'none';
  document.getElementById('selCount').textContent = cnt;
}

// ── Cloudinary変換 → Vision AI ────────────────────────────
async function startConvert() {
  if (!selectedImages.size) return;
  const f        = [...selectedImages.values()][0];
  const driveUrl = 'https://drive.google.com/uc?export=view&id=' + f.id;

  // 確認タブへ
  switchTab('confirm');
  document.getElementById('confirm-loading').style.display = 'block';
  document.getElementById('confirm-loading').textContent   = '☁️ Cloudinaryに変換中...';
  document.getElementById('confirm-form').style.display    = 'none';

  // Step1: Cloudinary
  let cloudinaryUrl = '';
  try {
    const res  = await fetch('/cloudinary/upload', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ drive_url: driveUrl, public_id: '' })
    });
    const data = await res.json();
    if (!data.url) {
      document.getElementById('confirm-loading').textContent = '⚠ Cloudinary変換失敗: ' + (data.error || '');
      return;
    }
    cloudinaryUrl = data.url;
    // バッジ更新
    const badge = document.getElementById('lb-' + f.id);
    if (badge) { badge.textContent = '☁ 変換済'; badge.className = 'lib-badge converted'; }
  } catch(e) {
    document.getElementById('confirm-loading').textContent = '⚠ エラー: ' + e.message;
    return;
  }

  // Step2: Vision AI
  document.getElementById('confirm-loading').textContent = '🔍 AI読み取りリクエスト中...';
  let responseId = '';
  try {
    const res  = await fetch('/analyze', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ image_url: cloudinaryUrl })
    });
    const data = await res.json();
    if (!data.response_id) {
      document.getElementById('confirm-loading').textContent = '⚠ AI読み取り失敗: ' + (data.error || '');
      return;
    }
    responseId = data.response_id;
  } catch(e) {
    document.getElementById('confirm-loading').textContent = '⚠ エラー: ' + e.message;
    return;
  }

  // Step3: ポーリング
  pollResult(responseId, cloudinaryUrl, 0);
}

function pollResult(responseId, cloudinaryUrl, attempt) {
  if (attempt > 20) {
    document.getElementById('confirm-loading').textContent = '⚠ タイムアウト。もう一度お試しください';
    return;
  }
  document.getElementById('confirm-loading').textContent = '⏳ AI解析中... (' + (attempt+1) + ')';
  setTimeout(async () => {
    try {
      const res  = await fetch('/analyze/result', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ response_id: responseId })
      });
      const data = await res.json();
      if (data.status === 'processing') { pollResult(responseId, cloudinaryUrl, attempt+1); return; }
      if (data.status === 'done' && data.data) { fillConfirmForm(data.data, cloudinaryUrl); return; }
      if (data.status === 'error') {
        document.getElementById('confirm-loading').textContent = '⚠ エラー: ' + (data.error||'');
        return;
      }
      pollResult(responseId, cloudinaryUrl, attempt+1);
    } catch(e) {
      document.getElementById('confirm-loading').textContent = '⚠ エラー: ' + e.message;
    }
  }, 2000);
}

function fillConfirmForm(d, imageUrl) {
  document.getElementById('confirm-loading').style.display = 'none';
  document.getElementById('confirm-form').style.display    = 'block';
  document.getElementById('f-service-title').value  = d.service_title  || '';
  document.getElementById('f-seller-name').value    = d.seller_name    || '';
  document.getElementById('f-seller-profile').value = d.seller_profile || '';
  document.getElementById('f-caption').value        = d.caption        || '';
  document.getElementById('f-price').value          = d.price          || '';
  document.getElementById('f-reviews').value        = d.reviews        || '';
  document.getElementById('f-category').value       = d.category       || '';
  document.getElementById('f-notes').value          = '';
  document.getElementById('f-image-url').value      = imageUrl;
  document.getElementById('edit-id').value          = '';
  document.getElementById('confirm-img').src        = imageUrl;
  document.getElementById('save-btn').textContent   = '✅ 登録する';
}

// ── 保存 ──────────────────────────────────────────────────
async function saveEntry() {
  const title = document.getElementById('f-service-title').value.trim();
  if (!title) { toast('サービスタイトルは必須です', 'err'); return; }
  const btn = document.getElementById('save-btn');
  btn.disabled = true; btn.textContent = '保存中...';
  const editId = document.getElementById('edit-id').value;
  const body = {
    service_title:  title,
    seller_name:    document.getElementById('f-seller-name').value,
    seller_profile: document.getElementById('f-seller-profile').value,
    caption:        document.getElementById('f-caption').value,
    price:          document.getElementById('f-price').value,
    reviews:        document.getElementById('f-reviews').value,
    category:       document.getElementById('f-category').value,
    image_url:      document.getElementById('f-image-url').value,
    notes:          document.getElementById('f-notes').value,
  };
  const url = editId ? '/research/entries/' + editId : '/research/entries';
  const res = await fetch(url, {
    method: editId ? 'PUT' : 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify(body)
  });
  btn.disabled = false;
  if (res.ok) {
    toast('✓ ' + (editId ? '更新しました' : '登録しました！'), 'ok');
    clearSelection();
    switchTab('list');
  } else {
    const d = await res.json();
    btn.textContent = editId ? '更新する' : '✅ 登録する';
    toast('⚠ ' + (d.error || 'エラーが発生しました'), 'err');
  }
}

// ── 一覧 ──────────────────────────────────────────────────
function initCats() {
  document.getElementById('cat-filters').innerHTML = CATEGORIES.map(c =>
    '<button class="cat-pill' + (c===currentFilter?' active':'') + '" onclick="setCategory(\'' + c + '\')">' + c + '</button>'
  ).join('');
}
function setCategory(cat) { currentFilter = cat; initCats(); loadEntries(); }
function onSearch() { clearTimeout(searchTimer); searchTimer = setTimeout(loadEntries, 300); }

async function loadEntries() {
  const search = document.getElementById('search-input').value;
  const params = new URLSearchParams({ search, category: currentFilter });
  const res    = await fetch('/research/entries?' + params);
  const entries = await res.json();
  document.getElementById('total-count').textContent = entries.length;
  renderEntries(entries);
}

function renderEntries(entries) {
  const el = document.getElementById('entries-container');
  if (!entries.length) {
    el.innerHTML = '<div style="text-align:center;padding:48px 20px;color:var(--muted2);font-size:13px">データがありません<br><br>ライブラリから画像を選択してAI読み取りしましょう</div>';
    return;
  }
  el.innerHTML = entries.map(e => {
    const img   = e.image_url ? '<img class="entry-thumb" src="' + e.image_url + '" alt="" loading="lazy">' : '';
    const badge = e.category  ? '<span class="cat-badge">' + e.category + '</span>' : '';
    const chips = [e.price?'<span class="chip">¥'+e.price+'</span>':'', e.reviews?'<span class="chip">★ '+e.reviews+'件</span>':''].filter(Boolean).join('');
    const cap   = e.caption   ? '<div class="entry-cap">' + e.caption.slice(0,60) + '…</div>' : '';
    return '<div class="entry-card" onclick="openDetail(' + e.id + ')">' + img +
      '<div class="entry-body">' + badge +
      '<div class="entry-title">' + e.service_title + '</div>' +
      (e.seller_name ? '<div class="entry-seller">@' + e.seller_name + '</div>' : '') +
      '<div class="entry-chips">' + chips + '</div>' + cap +
      '</div></div>';
  }).join('');
}

// ── 詳細 ──────────────────────────────────────────────────
async function openDetail(id) {
  const res = await fetch('/research/entries/' + id);
  const e   = await res.json();
  const img   = e.image_url ? '<img style="width:100%;border-radius:8px;margin-bottom:12px;display:block" src="' + e.image_url + '" alt="">' : '';
  const badge = e.category  ? '<span class="cat-badge">' + e.category + '</span><br>' : '';
  const chips = [e.price?'<span class="chip">¥'+e.price+'</span>':'', e.reviews?'<span class="chip">★ 評価 '+e.reviews+'件</span>':''].filter(Boolean).join('');
  const prof  = e.seller_profile ? '<div class="detail-sec"><div class="detail-sec-title">プロフィール</div><div class="detail-text">' + e.seller_profile + '</div></div>' : '';
  const cap   = e.caption ? '<div class="detail-sec"><div class="detail-sec-title">キャプション</div><div class="detail-text">' + e.caption + '</div></div>' : '';
  const notes = e.notes   ? '<div class="detail-sec"><div class="detail-sec-title">メモ・所感</div><div class="detail-text note-text">' + e.notes + '</div></div>' : '';
  document.getElementById('detail-content').innerHTML = img + badge +
    '<div style="font-size:16px;font-weight:700;margin-bottom:4px;line-height:1.4">' + e.service_title + '</div>' +
    (e.seller_name ? '<div style="font-size:12px;color:var(--muted);margin-bottom:8px">出品者: ' + e.seller_name + '</div>' : '') +
    '<div class="entry-chips" style="margin-bottom:12px">' + chips + '</div>' +
    prof + cap + notes +
    '<div style="display:flex;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)">' +
    '<div style="font-size:11px;color:var(--muted);flex:1">登録: ' + e.created_at + '</div>' +
    '<button class="btn btn-outline btn-sm" onclick="startEdit(' + e.id + ')">✏️ 編集</button>' +
    '<button class="btn btn-sm" style="background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.2)" onclick="if(confirm(\'削除しますか？\'))deleteEntry(' + e.id + ')">🗑</button>' +
    '</div>';
  switchTab('detail');
}

async function startEdit(id) {
  const res = await fetch('/research/entries/' + id);
  const e   = await res.json();
  document.getElementById('edit-id').value          = e.id;
  document.getElementById('f-service-title').value  = e.service_title;
  document.getElementById('f-seller-name').value    = e.seller_name;
  document.getElementById('f-seller-profile').value = e.seller_profile;
  document.getElementById('f-caption').value        = e.caption;
  document.getElementById('f-price').value          = e.price;
  document.getElementById('f-reviews').value        = e.reviews;
  document.getElementById('f-category').value       = e.category;
  document.getElementById('f-notes').value          = e.notes;
  document.getElementById('f-image-url').value      = e.image_url;
  document.getElementById('confirm-img').src        = e.image_url;
  document.getElementById('confirm-loading').style.display = 'none';
  document.getElementById('confirm-form').style.display    = 'block';
  document.getElementById('save-btn').textContent   = '更新する';
  switchTab('confirm');
}

async function deleteEntry(id) {
  await fetch('/research/entries/' + id, { method:'DELETE' });
  toast('削除しました', 'ok');
  switchTab('list');
}

// ── Toast ─────────────────────────────────────────────────
function toast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'show ' + (type || '');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.className = '', 2800);
}

// ── Init ──────────────────────────────────────────────────
initCats();
loadEntries();
</script>
</body>
</html>
