<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RESEARCH VAULT</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Noto+Sans+JP:wght@400;500;700&display=swap');
:root {
  --bg:#0d0d0f; --surface:rgba(255,255,255,0.03); --border:rgba(255,255,255,0.08);
  --gold:#c9a84c; --gold-dim:rgba(201,168,76,0.15); --text:#e8e4dc;
  --text-dim:rgba(232,228,220,0.45); --red:#e74c3c; --green:#27ae60;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;min-height:100vh}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse at 15% 15%,rgba(120,80,200,0.07) 0%,transparent 55%),
             radial-gradient(ellipse at 85% 85%,rgba(200,120,50,0.05) 0%,transparent 55%)}

/* ── Header ── */
header{position:sticky;top:0;z-index:100;border-bottom:1px solid var(--border);
  background:rgba(13,13,15,0.92);backdrop-filter:blur(14px)}
.header-inner{max-width:1100px;margin:0 auto;padding:15px 24px;
  display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:10px}
.logo-mark{font-size:20px;color:var(--gold)}
.logo-text{font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:700;letter-spacing:.22em}
.header-count{font-size:12px;color:var(--text-dim)}

/* ── Nav ── */
nav{max-width:1100px;margin:0 auto;padding:16px 24px 0;display:flex;gap:8px;position:relative;z-index:1}
.nav-btn{padding:8px 20px;border-radius:6px;border:1px solid var(--border);
  background:transparent;color:var(--text-dim);cursor:pointer;font-size:13px;
  font-family:'Noto Sans JP',sans-serif;transition:all .2s}
.nav-btn.active,.nav-btn:hover{background:var(--gold-dim);border-color:var(--gold);color:var(--gold)}

main{max-width:1100px;margin:0 auto;padding:32px 24px 80px;position:relative;z-index:1}

/* ── Toast ── */
#toast{position:fixed;top:20px;right:20px;color:#fff;padding:10px 20px;border-radius:8px;
  font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:9999;
  box-shadow:0 4px 20px rgba(0,0,0,.4)}
#toast.show{opacity:1}

/* ── Upload ── */
.upload-wrap{max-width:600px;margin:0 auto}
.upload-hero{text-align:center;margin-bottom:32px}
.hero-icon{font-size:40px;color:var(--gold);margin-bottom:12px}
.hero-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;margin-bottom:10px}
.hero-sub{font-size:13px;color:var(--text-dim);line-height:1.7}
.drop-zone{border:2px dashed rgba(255,255,255,0.15);border-radius:16px;padding:48px 24px;
  text-align:center;cursor:pointer;margin-bottom:20px;background:var(--surface);transition:all .2s}
.drop-zone.has-img{padding:0;cursor:default;border:1px solid rgba(201,168,76,0.3)}
.drop-zone:hover:not(.has-img){border-color:rgba(201,168,76,0.4);background:rgba(201,168,76,0.03)}
.drop-icon{font-size:48px;margin-bottom:12px}
.drop-text{font-size:16px;margin-bottom:6px}
.drop-sub{font-size:13px;color:var(--text-dim)}
.preview-wrap{position:relative}
.preview-img{width:100%;max-height:420px;object-fit:contain;border-radius:14px;display:block}
.change-btn{position:absolute;bottom:12px;right:12px;padding:6px 14px;
  background:rgba(13,13,15,0.85);border:1px solid rgba(255,255,255,0.2);
  border-radius:6px;color:var(--text);cursor:pointer;font-size:12px;
  font-family:'Noto Sans JP',sans-serif}
.analyze-btn{width:100%;padding:14px;
  background:linear-gradient(135deg,#c9a84c,#a07830);
  border:none;border-radius:10px;color:#0d0d0f;
  font-size:15px;font-weight:700;font-family:'Noto Sans JP',sans-serif;
  letter-spacing:.05em;cursor:pointer;margin-bottom:12px;transition:opacity .2s}
.analyze-btn:disabled{opacity:0.4;cursor:not-allowed}
.loading-bar{text-align:center;padding:12px 0}
.loading-step{font-size:13px;color:var(--gold);margin-bottom:4px}
.loading-sub{font-size:12px;color:var(--text-dim)}
.error-msg{color:var(--red);font-size:13px;text-align:center;margin-bottom:12px;padding:10px;
  background:rgba(231,76,60,0.08);border-radius:6px;border:1px solid rgba(231,76,60,0.2)}

/* ── Confirm ── */
.confirm-wrap{max-width:960px;margin:0 auto}
.confirm-badge{display:inline-block;padding:4px 12px;background:rgba(39,174,96,0.15);
  border:1px solid rgba(39,174,96,0.4);border-radius:20px;font-size:12px;color:var(--green);margin-bottom:10px}
.confirm-title{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;
  color:var(--gold);margin-bottom:24px}
.confirm-grid{display:grid;grid-template-columns:280px 1fr;gap:28px;margin-bottom:24px}
@media(max-width:700px){.confirm-grid{grid-template-columns:1fr}}
.col-label{font-size:10px;letter-spacing:.15em;color:var(--gold);text-transform:uppercase;margin-bottom:12px}
.confirm-img{width:100%;border-radius:10px;border:1px solid var(--border);display:block}

/* ── Form共通 ── */
label.field-label{display:block;font-size:12px;color:var(--text-dim);margin-bottom:4px;margin-top:10px}
input,textarea,select{width:100%;padding:10px 12px;background:rgba(255,255,255,0.05);
  border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;
  font-family:'Noto Sans JP',sans-serif;outline:none;transition:border-color .2s;box-sizing:border-box}
input:focus,textarea:focus,select:focus{border-color:rgba(201,168,76,0.5)}
select option{background:#1a1a1e}
textarea{resize:vertical}
.row-fields{display:flex;gap:12px}
.row-fields>div{flex:1}
.form-actions{display:flex;gap:12px;justify-content:flex-end;
  margin-top:28px;padding-top:20px;border-top:1px solid rgba(255,255,255,0.07)}
.cancel-btn{padding:10px 24px;background:transparent;border:1px solid rgba(255,255,255,0.15);
  border-radius:6px;color:var(--text-dim);cursor:pointer;font-size:13px;font-family:'Noto Sans JP',sans-serif}
.submit-btn{padding:10px 32px;background:linear-gradient(135deg,#c9a84c,#a07830);
  border:none;border-radius:6px;color:#0d0d0f;cursor:pointer;font-size:13px;
  font-weight:700;font-family:'Noto Sans JP',sans-serif;letter-spacing:.05em}
.submit-btn:disabled{opacity:0.5;cursor:not-allowed}

/* ── Filter ── */
.filter-bar{margin-bottom:24px;display:flex;flex-direction:column;gap:12px}
.search-input{width:100%;padding:12px 16px;background:var(--surface);border:1px solid var(--border);
  border-radius:8px;color:var(--text);font-size:14px;font-family:'Noto Sans JP',sans-serif;outline:none}
.search-input::placeholder{color:var(--text-dim)}
.cat-filters{display:flex;flex-wrap:wrap;gap:8px}
.cat-btn{padding:5px 14px;border-radius:20px;border:1px solid var(--border);
  background:transparent;color:var(--text-dim);cursor:pointer;font-size:12px;
  font-family:'Noto Sans JP',sans-serif;transition:all .2s}
.cat-btn.active,.cat-btn:hover{background:rgba(201,168,76,0.18);border-color:var(--gold);color:var(--gold)}

/* ── Grid ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;
  overflow:hidden;cursor:pointer;transition:border-color .2s,transform .15s}
.card:hover{border-color:rgba(201,168,76,0.35);transform:translateY(-2px)}
.card-img-wrap{position:relative;aspect-ratio:16/9;overflow:hidden}
.card-img{width:100%;height:100%;object-fit:cover;display:block}
.card-no-img{width:100%;height:100%;background:rgba(255,255,255,0.03);
  display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.18);font-size:12px}
.badge{position:absolute;top:8px;left:8px;background:rgba(201,168,76,0.88);color:#0d0d0f;
  font-size:10px;padding:3px 8px;border-radius:4px;font-weight:700;letter-spacing:.05em}
.card-body{padding:14px 16px}
.card-title{font-size:14px;font-weight:600;margin-bottom:4px;line-height:1.4}
.card-seller{font-size:12px;color:var(--text-dim);margin-bottom:8px}
.chips{display:flex;gap:6px;margin-bottom:8px;flex-wrap:wrap}
.chip{padding:2px 8px;background:rgba(255,255,255,0.06);border-radius:4px;font-size:11px;color:rgba(232,228,220,.7)}
.card-caption{font-size:12px;color:var(--text-dim);line-height:1.5}

/* ── Empty ── */
.empty{text-align:center;padding:80px 20px;color:rgba(232,228,220,0.3)}
.empty-icon{font-size:48px;color:rgba(201,168,76,0.3);margin-bottom:16px}
.empty-title{font-size:18px;margin-bottom:8px;font-family:'Cormorant Garamond',serif}
.empty-sub{font-size:13px}

/* ── Detail ── */
.back-btn{background:transparent;border:none;color:var(--text-dim);cursor:pointer;
  font-size:13px;margin-bottom:20px;padding:0;font-family:'Noto Sans JP',sans-serif}
.detail-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden}
.detail-img{width:100%;max-height:320px;object-fit:cover;display:block}
.detail-head{padding:24px 28px 16px;border-bottom:1px solid rgba(255,255,255,0.06)}
.detail-title{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:600;
  margin:6px 0 8px;line-height:1.4}
.detail-seller{font-size:13px;color:var(--text-dim);margin-bottom:10px}
.chip-lg{padding:4px 12px;background:rgba(255,255,255,0.06);border-radius:6px;font-size:13px;color:var(--text)}
.detail-section{padding:18px 28px;border-bottom:1px solid rgba(255,255,255,0.04)}
.detail-sec-title{font-size:10px;letter-spacing:.15em;color:var(--gold);margin-bottom:10px;text-transform:uppercase}
.detail-text{font-size:14px;line-height:1.8;color:rgba(232,228,220,0.8);white-space:pre-wrap}
.note-text{background:rgba(201,168,76,0.05);padding:12px 16px;border-radius:8px;border-left:3px solid rgba(201,168,76,.4)}
.detail-foot{padding:16px 28px;display:flex;align-items:center;justify-content:space-between}
.detail-date{font-size:11px;color:rgba(232,228,220,0.3)}
.detail-actions{display:flex;gap:10px}
.edit-btn{padding:7px 18px;background:var(--gold-dim);border:1px solid rgba(201,168,76,.35);
  border-radius:6px;color:var(--gold);cursor:pointer;font-size:12px;font-family:'Noto Sans JP',sans-serif}
.del-btn{padding:7px 18px;background:rgba(231,76,60,0.1);border:1px solid rgba(231,76,60,.3);
  border-radius:6px;color:var(--red);cursor:pointer;font-size:12px;font-family:'Noto Sans JP',sans-serif}
</style>
</head>
<body>

<div id="toast"></div>

<header>
  <div class="header-inner">
    <div class="logo">
      <span class="logo-mark">◈</span>
      <span class="logo-text">RESEARCH VAULT</span>
    </div>
    <div class="header-count">ococナラ競合DB · <span id="total-count">0</span>件</div>
  </div>
</header>

<nav>
  <button class="nav-btn active" id="nav-upload" onclick="showView('upload')">📷 スクショ登録</button>
  <button class="nav-btn" id="nav-list"   onclick="showView('list')">一覧 (<span id="nav-count">0</span>)</button>
</nav>

<main>

  <!-- ── UPLOAD VIEW ── -->
  <div id="view-upload">
    <div class="upload-wrap">
      <div class="upload-hero">
        <div class="hero-icon">◈</div>
        <div class="hero-title">スクショを貼るだけで自動入力</div>
        <div class="hero-sub">ページ全体のスクリーンショット1枚から<br>出品者名・タイトル・キャプション・価格・評価数をAIが自動で読み取ります</div>
      </div>

      <input type="file" id="file-input" accept="image/*" style="display:none" onchange="onFileSelect(event)">
      <div id="drop-zone" class="drop-zone" onclick="onDropZoneClick()" ondrop="onDrop(event)" ondragover="event.preventDefault()">
        <div id="drop-placeholder">
          <div class="drop-icon">📱</div>
          <div class="drop-text">ここにスクショをドロップ</div>
          <div class="drop-sub">またはタップして画像を選択</div>
        </div>
        <div id="preview-wrap" class="preview-wrap" style="display:none">
          <img id="preview-img" class="preview-img" src="" alt="">
          <button class="change-btn" onclick="event.stopPropagation(); document.getElementById('file-input').click()">画像を変更</button>
        </div>
      </div>

      <div id="error-msg" class="error-msg" style="display:none"></div>

      <button id="analyze-btn" class="analyze-btn" onclick="startAnalyze()" disabled>
        ✨　AIで自動読み取り
      </button>

      <div id="loading-bar" style="display:none" class="loading-bar">
        <div class="loading-step" id="loading-step">📤 Cloudinaryにアップロード中...</div>
        <div class="loading-sub">しばらくお待ちください</div>
      </div>
    </div>
  </div>

  <!-- ── CONFIRM VIEW ── -->
  <div id="view-confirm" style="display:none">
    <div class="confirm-wrap">
      <div class="confirm-badge">✅ 読み取り完了</div>
      <div class="confirm-title">内容を確認・修正して登録</div>

      <div class="confirm-grid">
        <div>
          <div class="col-label">元画像</div>
          <img id="confirm-img" class="confirm-img" src="" alt="">
        </div>
        <div>
          <div class="col-label">抽出データ（修正可能）</div>
          <input type="hidden" id="edit-id">
          <input type="hidden" id="f-image-url">

          <label class="field-label">サービスタイトル *</label>
          <input id="f-service-title" placeholder="例: 恋愛専門タロット占い">

          <label class="field-label">出品者名</label>
          <input id="f-seller-name" placeholder="例: 星詠み師あかり">

          <div class="row-fields">
            <div>
              <label class="field-label">価格（円）</label>
              <input id="f-price" placeholder="3000">
            </div>
            <div>
              <label class="field-label">評価数</label>
              <input id="f-reviews" placeholder="482">
            </div>
          </div>

          <label class="field-label">カテゴリ</label>
          <select id="f-category">
            <option value="">選択してください</option>
            <option>タロット</option><option>占星術</option><option>数秘術</option>
            <option>手相</option><option>霊視</option><option>その他</option>
          </select>

          <label class="field-label">プロフィール</label>
          <textarea id="f-seller-profile" style="min-height:70px" placeholder="出品者プロフィール文"></textarea>

          <label class="field-label">キャプション</label>
          <textarea id="f-caption" style="min-height:120px" placeholder="サービス説明文"></textarea>

          <label class="field-label">メモ・所感</label>
          <textarea id="f-notes" style="min-height:60px" placeholder="気になった点など"></textarea>
        </div>
      </div>

      <div class="form-actions">
        <button class="cancel-btn" onclick="showView('upload')">← やり直す</button>
        <button class="submit-btn" id="save-btn" onclick="saveEntry()">✅　登録する</button>
      </div>
    </div>
  </div>

  <!-- ── LIST VIEW ── -->
  <div id="view-list" style="display:none">
    <div class="filter-bar">
      <input class="search-input" id="search-input" placeholder="🔍　出品者名・タイトル・キャプションで検索" oninput="onSearch()">
      <div class="cat-filters" id="cat-filters"></div>
    </div>
    <div id="entries-container"></div>
  </div>

  <!-- ── DETAIL VIEW ── -->
  <div id="view-detail" style="display:none">
    <button class="back-btn" onclick="showView('list')">← 一覧に戻る</button>
    <div class="detail-card" id="detail-card"></div>
  </div>

</main>

<script>
const CATEGORIES = ['すべて','タロット','占星術','数秘術','手相','霊視','その他'];
let currentFilter = 'すべて';
let searchTimer   = null;

renderCatFilters();

function showView(v) {
  ['upload','confirm','list','detail'].forEach(n => {
    document.getElementById(`view-${n}`).style.display = n === v ? 'block' : 'none';
  });
  document.getElementById('nav-upload').className = `nav-btn${v==='upload'||v==='confirm' ? ' active' : ''}`;
  document.getElementById('nav-list').className   = `nav-btn${v==='list'||v==='detail'   ? ' active' : ''}`;
  if (v === 'list') loadEntries();
}

function onDropZoneClick() {
  if (document.getElementById('preview-wrap').style.display === 'none' || !document.getElementById('preview-wrap').style.display) {
    document.getElementById('file-input').click();
  }
}
function onFileSelect(e) { const f = e.target.files[0]; if(f) setPreview(f); }
function onDrop(e) { e.preventDefault(); const f = e.dataTransfer.files[0]; if(f) setPreview(f); }

function setPreview(file) {
  const reader = new FileReader();
  reader.onload = ev => {
    document.getElementById('drop-zone').classList.add('has-img');
    document.getElementById('drop-placeholder').style.display = 'none';
    document.getElementById('preview-wrap').style.display = 'block';
    document.getElementById('preview-img').src = ev.target.result;
    document.getElementById('file-input')._file = file;
    document.getElementById('analyze-btn').disabled = false;
    hideError();
  };
  reader.readAsDataURL(file);
}

// ── メインフロー ──────────────────────────────────────────
// Step1: /tmp保存 → Pabbly → Drive URL
// Step2: Drive URL → Pabbly Cloudinary → Cloudinary URL
// Step3: Cloudinary URL → Pabbly Vision → response_id
// Step4: ポーリング → 結果取得
async function startAnalyze() {
  const fileInput = document.getElementById('file-input');
  const file = fileInput._file || fileInput.files[0];
  if (!file) return;
  setLoading(true, '📤 Google Driveにアップロード中...');
  hideError();

  // Step1: upload → drive_url
  let driveUrl = '';
  try {
    const fd = new FormData();
    fd.append('file', file);
    const res  = await fetch('/research/upload', { method:'POST', body: fd });
    const data = await res.json();
    if (data.error && !data.drive_url) { showError('アップロードエラー: ' + data.error); setLoading(false); return; }
    driveUrl = data.drive_url;
    if (!driveUrl) { showError('Drive URLの取得に失敗しました'); setLoading(false); return; }
  } catch(e) { showError('アップロードエラー: ' + e.message); setLoading(false); return; }

  // Step2: drive_url → cloudinary url
  setLoading(true, '☁️ Cloudinaryに変換中...');
  let cloudinaryUrl = '';
  try {
    const res  = await fetch('/research/cloudinary', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ drive_url: driveUrl })
    });
    const data = await res.json();
    if (!data.url) { showError(data.error || 'Cloudinary変換失敗'); setLoading(false); return; }
    cloudinaryUrl = data.url;
  } catch(e) { showError('Cloudinaryエラー: ' + e.message); setLoading(false); return; }

  // Step3: cloudinary url → pabbly vision → response_id
  setLoading(true, '🔍 AI読み取りリクエスト中...');
  let responseId = '';
  try {
    const res  = await fetch('/research/analyze', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ image_url: cloudinaryUrl })
    });
    const data = await res.json();
    if (!data.response_id) { showError(data.error || 'response_id取得失敗'); setLoading(false); return; }
    responseId = data.response_id;
  } catch(e) { showError('分析リクエストエラー: ' + e.message); setLoading(false); return; }

  // Step4: ポーリング
  setLoading(true, '⏳ AI解析中...');
  pollResult(responseId, cloudinaryUrl, 0);
}

function pollResult(responseId, cloudinaryUrl, attempt) {
  if (attempt > 20) { showError('タイムアウト。もう一度お試しください'); setLoading(false); return; }
  setTimeout(async () => {
    try {
      const res  = await fetch('/research/result', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ response_id: responseId })
      });
      const data = await res.json();
      if (data.status === 'processing') { setLoading(true, `⏳ AI解析中... (${attempt+1})`); pollResult(responseId, cloudinaryUrl, attempt+1); return; }
      if (data.status === 'error')      { showError(data.error || '解析エラー'); setLoading(false); return; }
      if (data.status === 'done' && data.data) { setLoading(false); fillConfirmForm(data.data, cloudinaryUrl); return; }
      pollResult(responseId, cloudinaryUrl, attempt+1);
    } catch(e) { showError('ポーリングエラー: ' + e.message); setLoading(false); }
  }, 2000);
}

function fillConfirmForm(d, imageUrl) {
  document.getElementById('f-service-title').value  = d.service_title  || '';
  document.getElementById('f-seller-name').value    = d.seller_name    || '';
  document.getElementById('f-seller-profile').value = d.seller_profile || '';
  document.getElementById('f-caption').value        = d.caption        || '';
  document.getElementById('f-price').value          = d.price          || '';
  document.getElementById('f-reviews').value        = d.reviews        || '';
  document.getElementById('f-category').value       = d.category       || '';
  document.getElementById('f-notes').value          = '';
  document.getElementById('f-image-url').value      = imageUrl;
  document.getElementById('edit-id').value          = '';
  document.getElementById('confirm-img').src        = imageUrl;
  document.getElementById('save-btn').textContent   = '✅　登録する';
  showView('confirm');
}

async function saveEntry() {
  const title = document.getElementById('f-service-title').value.trim();
  if (!title) { toast('サービスタイトルは必須です','error'); return; }
  const btn = document.getElementById('save-btn');
  btn.disabled = true; btn.textContent = '保存中...';
  const editId = document.getElementById('edit-id').value;
  const body = {
    service_title: title,
    seller_name:    document.getElementById('f-seller-name').value,
    seller_profile: document.getElementById('f-seller-profile').value,
    caption:        document.getElementById('f-caption').value,
    price:          document.getElementById('f-price').value,
    reviews:        document.getElementById('f-reviews').value,
    category:       document.getElementById('f-category').value,
    image_url:      document.getElementById('f-image-url').value,
    notes:          document.getElementById('f-notes').value,
  };
  const url = editId ? `/research/entries/${editId}` : '/research/entries';
  const res = await fetch(url, { method: editId?'PUT':'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
  btn.disabled = false;
  if (res.ok) { toast(editId?'更新しました':'登録しました！'); resetUpload(); showView('list'); }
  else { const d = await res.json(); btn.textContent = editId?'更新する':'✅　登録する'; toast(d.error||'エラーが発生しました','error'); }
}

function renderCatFilters() {
  document.getElementById('cat-filters').innerHTML = CATEGORIES.map(c =>
    `<button class="cat-btn${c===currentFilter?' active':''}" onclick="setCategory('${c}')">${c}</button>`
  ).join('');
}
function setCategory(cat) { currentFilter = cat; renderCatFilters(); loadEntries(); }
function onSearch() { clearTimeout(searchTimer); searchTimer = setTimeout(loadEntries, 300); }

async function loadEntries() {
  const search = document.getElementById('search-input').value;
  const params = new URLSearchParams({ search, category: currentFilter });
  const res = await fetch(`/research/entries?${params}`);
  const entries = await res.json();
  document.getElementById('total-count').textContent = entries.length;
  document.getElementById('nav-count').textContent   = entries.length;
  renderEntries(entries);
}

function renderEntries(entries) {
  const el = document.getElementById('entries-container');
  if (!entries.length) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">◈</div><div class="empty-title">データがありません</div><div class="empty-sub">「📷 スクショ登録」からデータを追加しましょう</div></div>`;
    return;
  }
  el.innerHTML = `<div class="grid">${entries.map(e => cardHTML(e)).join('')}</div>`;
}

function cardHTML(e) {
  const img   = e.image_url ? `<img src="${e.image_url}" class="card-img" alt="">` : `<div class="card-no-img">No Image</div>`;
  const badge = e.category  ? `<span class="badge">${e.category}</span>` : '';
  const chips = [e.price?`<span class="chip">¥${e.price}</span>`:'', e.reviews?`<span class="chip">★ ${e.reviews}件</span>`:''].filter(Boolean).join('');
  const cap   = e.caption   ? `<div class="card-caption">${e.caption.slice(0,55)}…</div>` : '';
  return `<div class="card" onclick="openDetail(${e.id})"><div class="card-img-wrap">${img}${badge}</div><div class="card-body"><div class="card-title">${e.service_title}</div>${e.seller_name?`<div class="card-seller">@${e.seller_name}</div>`:''}<div class="chips">${chips}</div>${cap}</div></div>`;
}

async function openDetail(id) {
  const res = await fetch(`/research/entries/${id}`);
  const e   = await res.json();
  const img   = e.image_url ? `<img src="${e.image_url}" class="detail-img" alt="">` : '';
  const badge = e.category  ? `<span class="badge" style="position:static;margin-bottom:10px;display:inline-block">${e.category}</span>` : '';
  const chips = [e.price?`<span class="chip-lg">¥${e.price}</span>`:'', e.reviews?`<span class="chip-lg">★ 評価 ${e.reviews}件</span>`:''].filter(Boolean).join('');
  const prof  = e.seller_profile ? `<div class="detail-section"><div class="detail-sec-title">プロフィール</div><div class="detail-text">${e.seller_profile}</div></div>` : '';
  const cap   = e.caption ? `<div class="detail-section"><div class="detail-sec-title">キャプション</div><div class="detail-text">${e.caption}</div></div>` : '';
  const notes = e.notes   ? `<div class="detail-section"><div class="detail-sec-title">メモ・所感</div><div class="detail-text note-text">${e.notes}</div></div>` : '';
  document.getElementById('detail-card').innerHTML = `${img}<div class="detail-head">${badge}<div class="detail-title">${e.service_title}</div>${e.seller_name?`<div class="detail-seller">出品者: ${e.seller_name}</div>`:''}<div class="chips">${chips}</div></div>${prof}${cap}${notes}<div class="detail-foot"><div class="detail-date">登録: ${e.created_at}</div><div class="detail-actions"><button class="edit-btn" onclick="startEdit(${e.id})">✏️ 編集</button><button class="del-btn" onclick="if(confirm('削除しますか？'))deleteEntry(${e.id})">🗑 削除</button></div></div>`;
  showView('detail');
}

async function startEdit(id) {
  const res = await fetch(`/research/entries/${id}`);
  const e   = await res.json();
  document.getElementById('edit-id').value          = e.id;
  document.getElementById('f-service-title').value  = e.service_title;
  document.getElementById('f-seller-name').value    = e.seller_name;
  document.getElementById('f-seller-profile').value = e.seller_profile;
  document.getElementById('f-caption').value        = e.caption;
  document.getElementById('f-price').value          = e.price;
  document.getElementById('f-reviews').value        = e.reviews;
  document.getElementById('f-category').value       = e.category;
  document.getElementById('f-notes').value          = e.notes;
  document.getElementById('f-image-url').value      = e.image_url;
  document.getElementById('confirm-img').src        = e.image_url;
  document.getElementById('save-btn').textContent   = '更新する';
  showView('confirm');
}

async function deleteEntry(id) {
  await fetch(`/research/entries/${id}`, { method:'DELETE' });
  toast('削除しました');
  showView('list');
}

function setLoading(on, msg='') {
  document.getElementById('analyze-btn').disabled = on;
  document.getElementById('loading-bar').style.display = on ? 'block' : 'none';
  if (msg) document.getElementById('loading-step').textContent = msg;
}
function showError(msg) { const el=document.getElementById('error-msg'); el.textContent=msg; el.style.display='block'; }
function hideError() { document.getElementById('error-msg').style.display='none'; }
function resetUpload() {
  document.getElementById('drop-zone').classList.remove('has-img');
  document.getElementById('drop-placeholder').style.display = 'block';
  document.getElementById('preview-wrap').style.display = 'none';
  document.getElementById('preview-img').src = '';
  document.getElementById('analyze-btn').disabled = true;
  document.getElementById('file-input').value = '';
  document.getElementById('file-input')._file = null;
  hideError();
}
function toast(msg, type='success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.background = type==='error' ? '#e74c3c' : '#27ae60';
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2800);
}

</script>
</body>
</html>
